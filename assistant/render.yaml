services:
  - type: worker
    name: devbot-slack-assistant
    runtime: python
    repo: https://github.com/ds335033/devbot
    rootDir: assistant
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
