services:
  - type: web
    name: devbot-api
    runtime: node
    repo: https://github.com/ds335033/devbot
    buildCommand: npm install
    startCommand: node src/core/app.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
    healthCheckPath: /health

  - type: worker
    name: devbot-trading-bot
    runtime: python
    repo: https://github.com/ds335033/devbot
    rootDir: trading-bot
    buildCommand: pip install -r requirements.txt
    startCommand: python trade_now.py
    plan: free
    envVars:
      - key: CDP_API_KEY_NAME
        sync: false
      - key: CDP_API_KEY_PRIVATE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NETWORK_ID
        value: base-sepolia
      - key: TRADE_AMOUNT_USD
        value: "25"
      - key: STRATEGY
        value: dca
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: worker
    name: devbot-slack-assistant
    runtime: python
    repo: https://github.com/ds335033/devbot
    rootDir: assistant
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: static
    name: devbot-storefront
    repo: https://github.com/ds335033/devbot
    rootDir: storefront
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: .
    plan: free
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: static
    name: scent-of-adelaide
    repo: https://github.com/ds335033/devbot
    rootDir: scent-of-adelaide
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: .
    plan: free
